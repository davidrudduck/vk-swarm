name: Remote Hive Build

on:
  pull_request:
    paths:
      - 'crates/remote/**'
      # remote-frontend is built inside the hive image (crates/remote/Dockerfile runs
      # `pnpm install --filter ./remote-frontend --frozen-lockfile`), so manifest/source
      # changes here MUST trigger this workflow. Omitting it let PR #457 add deps to
      # remote-frontend/package.json without ever exercising the frozen-lockfile build.
      - 'remote-frontend/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/assert-dockerfile-node-match.sh'
      - '.github/workflows/remote-hive-build.yml'
  workflow_dispatch:

concurrency:
  group: remote-hive-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  assert-dockerfile-match:
    name: Assert Dockerfile node version match
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: bash scripts/assert-dockerfile-node-match.sh

  build-remote:
    name: Verify remote-server plumbing
    runs-on: ubuntu-latest
    needs: assert-dockerfile-match
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify rebuild.sh syntax
        run: |
          bash -n crates/remote/rebuild.sh
          echo "rebuild.sh syntax OK"
      - name: Verify PNPM_VERSION plumbing
        run: |
          EXPECTED_VERSION=$(jq -re '.packageManager | sub("^pnpm@"; "")' package.json)
          echo "Expected pnpm version from package.json: $EXPECTED_VERSION"
          grep -q "ARG PNPM_VERSION=${EXPECTED_VERSION}" Dockerfile || {
            echo "MISMATCH: root Dockerfile ARG default != package.json ($EXPECTED_VERSION)"
            exit 1
          }
          grep -q "ARG PNPM_VERSION=${EXPECTED_VERSION}" crates/remote/Dockerfile || {
            echo "MISMATCH: remote Dockerfile ARG default != package.json ($EXPECTED_VERSION)"
            exit 1
          }
          COMPOSE_VERSION=$(grep -oE 'PNPM_VERSION: .*\{[a-zA-Z0-9_]+:-([0-9.]+)\}' crates/remote/docker-compose.yml | grep -oE '[0-9.]+' | tail -1)
          echo "Compose fallback version: $COMPOSE_VERSION"
          [ "$COMPOSE_VERSION" = "$EXPECTED_VERSION" ] || {
            echo "MISMATCH: compose fallback ($COMPOSE_VERSION) != package.json ($EXPECTED_VERSION)"
            exit 1
          }
          echo "PNPM_VERSION plumbing OK"
      - name: Verify engines.node constraint
        run: |
          ENGINE=$(jq -r '.engines.node' package.json)
          echo "engines.node: $ENGINE"
          if [ "$ENGINE" != ">=22.13" ]; then
            echo "engines.node mismatch: expected >=22.13, got $ENGINE"
            exit 1
          fi
      - name: Verify cross-file coupling comments exist
        run: |
          grep -q "keep in sync" Dockerfile || { echo "Missing cross-file comment in root Dockerfile"; exit 1; }
          grep -q "keep in sync" crates/remote/Dockerfile || { echo "Missing cross-file comment in crate/remote Dockerfile"; exit 1; }

  docker-build:
    name: Docker build (remote-server)
    runs-on: ubuntu-latest
    needs: build-remote
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build remote-server image
        run: |
          set -o pipefail
          PNPM_VERSION=$(jq -re '.packageManager | sub("^pnpm@"; "")' package.json)
          export PNPM_VERSION
          cp crates/remote/.env.remote.dev crates/remote/.env.remote
          echo 'LOOPS_EMAIL_API_KEY=ci-placeholder' >> crates/remote/.env.remote
          (cd crates/remote && docker compose --env-file .env.remote build --no-cache remote-server 2>&1 | tee /tmp/ci-build.log)
          ! grep -q "ERR_UNKNOWN_BUILTIN_MODULE" /tmp/ci-build.log || {
            echo "FAIL: ERR_UNKNOWN_BUILTIN_MODULE still present in build log"
            exit 1
          }
          echo "BUILD PASSED: no ERR_UNKNOWN_BUILTIN_MODULE"
