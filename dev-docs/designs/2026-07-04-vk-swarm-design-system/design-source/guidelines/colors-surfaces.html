<!-- @dsCard group="Colors" viewport="700x180" name="Brand surfaces" subtitle="Midnight Terminal — void, surface, raised" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 76px; }
  .meta { padding: 8px 10px; background: var(--surface-card); }
  .name { font-size: var(--text-sm); font-weight: 600; color: var(--text-body); }
  .hex { font-family: var(--font-code); font-size: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:var(--vks-void)"></div>
      <div class="meta"><div class="name">Void</div><div class="hex">#0a0a0f · --background</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--vks-surface)"></div>
      <div class="meta"><div class="name">Surface</div><div class="hex">#12121a · --surface-card</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--vks-surface-bright)"></div>
      <div class="meta"><div class="name">Raised</div><div class="hex">#1a1a24 · --surface-raised</div></div>
    </div>
  </div>
</body>
</html>
