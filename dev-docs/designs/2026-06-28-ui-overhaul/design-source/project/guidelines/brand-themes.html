<!-- @dsCard group="Brand" viewport="700x200" name="Dark & light themes" subtitle="Dark-first signature; opt-in light via [data-theme]" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .pane { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--background); }
  .bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .btn { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 500; padding: 6px 12px; border-radius: var(--radius-md); border: 1px solid var(--primary); background: var(--primary); color: var(--primary-foreground); }
  .chip { font-size: var(--text-xs); font-weight: 600; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--border-strong); color: var(--text-body); }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .lbl { font-size: var(--text-xs); font-family: var(--font-code); letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
  .card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; }
  .title { font-size: var(--text-sm); font-weight: 600; color: var(--foreground); }
  .muted { font-size: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="pane" data-theme="dark">
    <div class="bar"><span class="lbl">Dark · default</span></div>
    <div class="body">
      <div class="row"><span class="btn">Merge</span><span class="chip">main</span><span class="dot" style="background:var(--status-inprogress)"></span><span class="muted">In Progress</span></div>
      <div class="card"><div class="title">Wire up OAuth callback</div><div class="muted">justX · 2d</div></div>
    </div>
  </div>
  <div class="pane" data-theme="light">
    <div class="bar"><span class="lbl">Light · opt-in</span></div>
    <div class="body">
      <div class="row"><span class="btn">Merge</span><span class="chip">main</span><span class="dot" style="background:var(--status-inprogress)"></span><span class="muted">In Progress</span></div>
      <div class="card"><div class="title">Wire up OAuth callback</div><div class="muted">justX · 2d</div></div>
    </div>
  </div>
</body>
</html>
